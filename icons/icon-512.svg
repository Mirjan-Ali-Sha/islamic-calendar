<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#061224"/>
    </linearGradient>
    <!-- Glossy moon gradient -->
    <radialGradient id="moonGrad512" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fff8dc"/>
      <stop offset="25%" stop-color="#ffd700"/>
      <stop offset="60%" stop-color="#e8a830"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
    <!-- Moon shine overlay -->
    <radialGradient id="moonShine512" cx="30%" cy="25%" r="45%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Mosque gradient -->
    <linearGradient id="mosqueGrad512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e6aa"/>
      <stop offset="40%" stop-color="#00c896"/>
      <stop offset="100%" stop-color="#008866"/>
    </linearGradient>
    <!-- Mosque shine -->
    <linearGradient id="mosqueShine512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Star gradient -->
    <radialGradient id="starGrad512" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fffef0"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </radialGradient>
    <!-- Glow filters -->
    <filter id="moonGlow512" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow512" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="mosqueGlow512" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#00c896" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glass overlay -->
    <linearGradient id="glassOverlay512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.1)"/>
    </linearGradient>
    <!-- Border glow -->
    <linearGradient id="borderGlow512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,200,150,0.4)"/>
      <stop offset="50%" stop-color="rgba(255,215,0,0.3)"/>
      <stop offset="100%" stop-color="rgba(0,200,150,0.4)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg512)"/>
  <!-- Glass overlay -->
  <rect width="512" height="512" rx="100" fill="url(#glassOverlay512)"/>
  <!-- Glowing border -->
  <rect x="2" y="2" width="508" height="508" rx="98" fill="none" stroke="url(#borderGlow512)" stroke-width="3"/>

  <!-- Decorative background stars -->
  <circle cx="75" cy="100" r="2.5" fill="#fff" opacity="0.3"/>
  <circle cx="430" cy="85" r="2" fill="#fff" opacity="0.25"/>
  <circle cx="55" cy="280" r="1.5" fill="#fff" opacity="0.15"/>
  <circle cx="460" cy="300" r="2" fill="#fff" opacity="0.2"/>
  <circle cx="120" cy="420" r="1.8" fill="#fff" opacity="0.15"/>
  <circle cx="400" cy="400" r="2.5" fill="#fff" opacity="0.2"/>
  <circle cx="50" cy="180" r="1.2" fill="#fff" opacity="0.12"/>
  <circle cx="465" cy="190" r="1.5" fill="#fff" opacity="0.18"/>
  <circle cx="250" cy="440" r="1.5" fill="#fff" opacity="0.12"/>

  <!-- Crescent Moon with glow -->
  <g filter="url(#moonGlow512)">
    <circle cx="256" cy="175" r="90" fill="url(#moonGrad512)"/>
    <circle cx="298" cy="152" r="74" fill="url(#bg512)"/>
    <!-- Glossy shine -->
    <circle cx="256" cy="175" r="90" fill="url(#moonShine512)"/>
    <circle cx="298" cy="152" r="74" fill="url(#bg512)"/>
  </g>

  <!-- Star with glow -->
  <polygon points="224,140 232,160 252,160 236,174 242,194 224,182 206,194 212,174 196,160 216,160" fill="url(#starGrad512)" filter="url(#starGlow512)"/>

  <!-- Mosque with glow -->
  <g filter="url(#mosqueGlow512)">
    <path d="M120,395 L120,340 Q120,314 148,300 L148,286 Q148,260 174,246 Q200,232 226,246 L256,260 L286,246 Q312,232 338,246 Q364,260 364,286 L364,300 Q392,314 392,340 L392,395 Z" fill="url(#mosqueGrad512)"/>
    <!-- Glossy shine on mosque -->
    <path d="M120,395 L120,340 Q120,314 148,300 L148,286 Q148,260 174,246 Q200,232 226,246 L256,260 L286,246 Q312,232 338,246 Q364,260 364,286 L364,300 Q392,314 392,340 L392,395 Z" fill="url(#mosqueShine512)"/>
  </g>

  <!-- Dome -->
  <ellipse cx="256" cy="258" rx="48" ry="37" fill="url(#mosqueGrad512)"/>
  <ellipse cx="256" cy="258" rx="48" ry="37" fill="url(#mosqueShine512)"/>
  <!-- Dome finial -->
  <circle cx="256" cy="220" r="9" fill="url(#moonGrad512)" filter="url(#starGlow512)"/>

  <!-- Minarets -->
  <rect x="133" y="278" width="18" height="117" rx="9" fill="url(#mosqueGrad512)"/>
  <rect x="133" y="278" width="9" height="117" rx="4" fill="url(#mosqueShine512)"/>
  <circle cx="142" cy="274" r="12" fill="url(#moonGrad512)" filter="url(#starGlow512)"/>

  <rect x="361" y="278" width="18" height="117" rx="9" fill="url(#mosqueGrad512)"/>
  <rect x="370" y="278" width="9" height="117" rx="4" fill="url(#mosqueShine512)"/>
  <circle cx="370" cy="274" r="12" fill="url(#moonGrad512)" filter="url(#starGlow512)"/>

  <!-- Door -->
  <rect x="237" y="348" width="38" height="47" rx="19" fill="url(#bg512)" opacity="0.6"/>
  <!-- Door inner glow -->
  <rect x="241" y="354" width="30" height="41" rx="15" fill="rgba(255,215,0,0.06)"/>
</svg>
